
services:

  # ── BACKEND: FastAPI + LangGraph + RAG ──────────────────────────────────
  - type: web
    name: ai-content-studio-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: MASTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DEVTO_API_KEY
        sync: false
      - key: BLUESKY_HANDLE
        sync: false
      - key: BLUESKY_APP_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: PEXELS_API_KEY
        sync: false

  # ── FRONTEND: Streamlit only ────────────────────────────────────────────
  - type: web
    name: ai-content-studio
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: free
    envVars:
      # Render fills this in automatically with the backend's public URL
      # Set manually in the dashboard to the backend's PUBLIC URL, e.g.
      # https://ai-content-studio-api.onrender.com
      # (fromService's "host" property returns an internal address that
      # doesn't reliably resolve on the free tier — a manual public URL
      # is simpler and guaranteed to work, since it's the same URL that
      # already answers /health successfully.)
      - key: BACKEND_URL
        sync: false
      # Must match the backend's MASTER_API_KEY exactly
      - key: MASTER_API_KEY
        sync: false