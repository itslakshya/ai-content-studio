# ═══════════════════════════════════════════════════════════════════════════
# TWO SEPARATE SERVICES — each gets its own full 512MB.
#
# Why: a single container running Streamlit (~200MB) AND FastAPI with two
# ONNX models (~340MB) peaks around 540MB, which exceeds Render's 512MB
# free-tier limit. The OOM killer then kills the background process.
# Splitting them means neither ever competes for RAM.
# ═══════════════════════════════════════════════════════════════════════════
services:

  # ── BACKEND: FastAPI + LangGraph + RAG ──────────────────────────────────
  - type: web
    name: ai-content-studio-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: MASTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DEVTO_API_KEY
        sync: false
      - key: BLUESKY_HANDLE
        sync: false
      - key: BLUESKY_APP_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: PEXELS_API_KEY
        sync: false

  # ── FRONTEND: Streamlit only ────────────────────────────────────────────
  - type: web
    name: ai-content-studio
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: free
    envVars:
      # Render fills this in automatically with the backend's public URL
      # Render injects the backend's hostname (e.g. "xxx.onrender.com").
      # The frontend prepends https:// automatically if the scheme is absent.
      - key: BACKEND_URL
        fromService:
          name: ai-content-studio-api
          type: web
          property: host
      # Must match the backend's MASTER_API_KEY exactly
      - key: MASTER_API_KEY
        sync: false